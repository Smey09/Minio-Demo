name: CI - Build, Test, Build & Push Container

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: maven

            - name: Build and test JAR
              working-directory: filestorage
              run: |
                  chmod +x ./mvnw
                  ./mvnw -B -ntp clean verify

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v2

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image to GHCR
              uses: docker/build-push-action@v5
              with:
                  context: ./filestorage
                  file: ./filestorage/Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/filestorage:latest
                      ghcr.io/${{ github.repository_owner }}/filestorage:${{ github.sha }}
