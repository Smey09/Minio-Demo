name: CI/CD Pipeline v1

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

permissions:
    contents: read

jobs:
    build:
        name: Build and Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: maven

            - name: Build and test Spring Boot service
              working-directory: filestorage
              run: |
                  chmod +x ./mvnw
                  ./mvnw -B -ntp clean verify

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: filestorage-jar
                  path: filestorage/target/filestorage-0.0.1-SNAPSHOT.jar

    deploy:
        name: Publish artifact for deployment
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: filestorage-jar

            - name: Prepare deployment package
              run: |
                  mkdir -p deployment
                  cp filestorage-0.0.1-SNAPSHOT.jar deployment/

            - name: Upload deployment package
              uses: actions/upload-artifact@v4
              with:
                  name: filestorage-deployment-package
                  path: deployment/filestorage-0.0.1-SNAPSHOT.jar
