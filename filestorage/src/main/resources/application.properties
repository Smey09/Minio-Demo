spring.application.name=filestorage

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.smeydev.filestorage=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# MinIO Configuration
# MinIO Server URL (e.g., http://localhost:9000 for local, https://minio.example.com for remote)
minio.url=http://localhost:9000

# MinIO Access Key (username)
minio.access-key=admin

# MinIO Secret Key (password)
minio.secret-key=password123

# Default bucket name for file storage
minio.bucket-name=uploads

# Multipart upload configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Springdoc OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha



